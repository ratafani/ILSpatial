name: ILSpatial
options:
  bundleIdPrefix: com.ilspatial
  deploymentTarget:
    visionOS: 26.0

packages:
  ILSFoundation:
    path: Packages/Core/ILSFoundation
  ILSEngine:
    path: Packages/Core/ILSEngine
  ILSRealityAssets:
    path: Packages/RealityKitContent/ILSRealityAssets
  ILSHandTracking:
    path: Packages/Features/ILSHandTracking
  ILSSpatialAudio:
    path: Packages/Features/ILSSpatialAudio
  ILSSpatialDraw:
    path: Packages/Features/ILSSpatialDraw
  ILSDesignSystem:
    path: Packages/Components/ILSDesignSystem

targets:
  ILSpatialApp:
    type: application
    platform: visionOS
    sources:
      - ILSpatialApp/Sources
    dependencies:
      - package: ILSFoundation
        product: ILSFoundation
      - package: ILSEngine
        product: ILSEngine
      - package: ILSRealityAssets
        product: ILSRealityAssets
      - package: ILSHandTracking
        product: ILSHandTracking
      - package: ILSSpatialAudio
        product: ILSSpatialAudio
      - package: ILSSpatialDraw
        product: ILSSpatialDraw
      - package: ILSDesignSystem
        product: ILSDesignSystem
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSHandsTrackingUsageDescription: "This app requires hand tracking for gesture controls."
